<section id="depoimentos" class="section section-dark">
  <div class="container">
    <h2>Depoimentos</h2>
    <p>Deixe uma mensagem carinhosa para o casal.</p>
    <form id="testimonial-form" class="form-card">
      <div class="form-row">
        <label for="testimonial-name">Nome</label>
        <input type="text" id="testimonial-name" name="testimonial-name" placeholder="Seu nome" required />
      </div>
      <div class="form-row">
        <label for="testimonial-text">Depoimento</label>
        <textarea id="testimonial-text" name="testimonial-text" rows="4" placeholder="Escreva seu depoimento" required></textarea>
      </div>
      <div class="form-row">
        <label>Anexar áudio ou vídeo</label>
          <div class="media-controls">
            <button type="button" id="record-audio" class="button">Gravar áudio</button>
            <button type="button" id="record-video" class="button">Gravar vídeo</button>
            <label class="button" for="media-input" style="cursor:pointer;">Enviar arquivo</label>
            <input type="file" id="media-input" accept="audio/*,video/*,image/*" style="display:none" />
          </div>
          <p class="muted">Você pode gravar diretamente pelo celular ou enviar um arquivo. Visualize antes de confirmar.</p>

          <div id="media-preview" class="media-preview" style="display:none; margin-top:1rem;">
            <div id="media-preview-area"></div>
            <div class="preview-controls" style="margin-top:0.5rem; display:flex; gap:0.5rem; align-items:center;">
              <button type="button" id="confirm-media" class="button">Confirmar mídia</button>
              <button type="button" id="remove-media" class="button">Remover</button>
              <div id="upload-progress" style="display:none; width:220px;">
                <div style="font-size:0.85rem; margin-bottom:0.25rem;" id="upload-status">Enviando...</div>
                <progress id="upload-progress-bar" value="0" max="100" style="width:100%;"></progress>
                <div style="margin-top:0.25rem; display:flex; gap:0.5rem;">
                  <button type="button" id="retry-upload" class="button" style="display:none;">Tentar novamente</button>
                  <button type="button" id="cancel-upload" class="button" style="display:none;">Cancelar</button>
                </div>
              </div>
            </div>
          </div>
      </div>
      <button type="submit" class="button">Enviar depoimento</button>
      <p id="testimonial-message" class="form-message" aria-live="polite"></p>
    </form>
    <div id="testimonial-list" class="testimonial-grid"></div>

    <!-- Recorder overlay (hidden until recording) -->
    <div id="recorder-overlay" class="recorder-overlay" style="display:none;">
      <div class="recorder-panel">
        <div class="rec-dot"></div>
        <div class="rec-info">
          <strong>Gravando...</strong>
          <div id="rec-timer">00:00</div>
        </div>
        <button id="rec-stop" class="button">Parar gravação</button>
      </div>
    </div>
  </div>
</section>
